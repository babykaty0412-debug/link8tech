<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="雲端點餐系統：顧客點餐、訂單管理、廚房出單、師傅排班" />
    <title>訂單管理系統</title>
    <!-- 首屏前同步套用主題，避免深色模式重整時先閃一下淺色（FOUC） -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('order-dashboard-theme')
          var dark =
            saved === 'dark' ||
            (!saved &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.setAttribute(
            'data-theme',
            dark ? 'dark' : 'light',
          )
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
